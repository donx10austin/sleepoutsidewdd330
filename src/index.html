<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <!-- Wishlist styling -->
    <style>
      .product-card {
        position: relative;
        display: flex;
        flex-direction: column;
      }
      .wishlist-btn {
        background: #ffffff;
        border: 1px solid #ccc;
        padding: 0.5rem;
        cursor: pointer;
        border-radius: 4px;
        margin: 0.5rem 1rem 1rem 1rem;
        font-weight: bold;
        transition: background 0.2s ease;
      }
      .wishlist-btn:hover {
        background: #f0f0f0;
        border-color: #333;
      }
    </style>
  </head>

  <body>
    <header id="header" class="divider"></header>

    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="products">
        <h2>Top Products</h2>
        <!-- Dynamically populated by ProductList.mjs -->
        <ul class="product-list" id="product-list"></ul>
      </section>
    </main>

    <footer id="footer"></footer>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
